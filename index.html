<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Prompt Studio — GPT 生圖提示詞工作室</title>
<style>
  :root{
    --bg:#0f1117; --panel:#181b25; --panel2:#1f2330; --border:#2a2f40;
    --text:#e8eaf2; --muted:#8b91a7; --accent:#8b7cf6; --accent2:#5eead4;
    --chip:#242938; --chip-on:#3b3170; --danger:#f87171;
    --radius:12px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
    min-height:100vh;
  }
  header{
    padding:20px 28px 12px; display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
  }
  header h1{font-size:22px; font-weight:700; letter-spacing:.5px;}
  header h1 .en{color:var(--accent); margin-right:8px;}
  header .sub{color:var(--muted); font-size:13px;}
  .layout{
    display:grid; grid-template-columns:1fr 400px; gap:18px;
    padding:0 28px 40px; max-width:1500px; margin:0 auto;
  }
  /* ===== 手機版：預覽變成底部抽屜 ===== */
  .sheet-bar{display:none;}
  @media (max-width:980px){
    .layout{grid-template-columns:1fr; padding-bottom:110px;}
    .preview-wrap{position:fixed!important; top:auto!important; bottom:0; left:0; right:0; z-index:50;}
    .sheet-bar{
      display:flex; align-items:center; gap:10px;
      background:var(--panel); border:1px solid var(--accent); border-bottom:none;
      border-radius:14px 14px 0 0; padding:12px 14px; cursor:pointer;
      box-shadow:0 -6px 24px rgba(0,0,0,.45);
    }
    .sheet-bar .snippet{
      flex:1; font-size:12px; color:var(--muted); white-space:nowrap;
      overflow:hidden; text-overflow:ellipsis;
    }
    .preview{display:none; border-radius:0; border-top:none;
      max-height:60vh; overflow-y:auto; -webkit-overflow-scrolling:touch;
      padding-bottom:calc(18px + env(safe-area-inset-bottom));}
    .sheet-bar{padding-bottom:calc(12px + env(safe-area-inset-bottom));}
    .preview-wrap.open .sheet-bar{padding-bottom:12px;}
    .preview-wrap.open .preview{display:block;}
    .chip{padding:8px 14px;}  /* 加大觸控面積 */
  }

  /* tabs */
  .tabs{display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap;}
  .tab{
    padding:8px 16px; border-radius:999px; background:var(--chip); border:1px solid var(--border);
    color:var(--muted); cursor:pointer; font-size:14px; transition:.15s;
  }
  .tab:hover{color:var(--text);}
  .tab.on{background:var(--chip-on); color:#fff; border-color:var(--accent);}
  .page{display:none;}
  .page.on{display:block;}

  .card{
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px 18px; margin-bottom:14px;
  }
  .card h3{font-size:14px; margin-bottom:10px; display:flex; align-items:center; gap:8px;}
  .card h3 .zh{font-weight:700;}
  .card h3 .en{color:var(--muted); font-weight:400; font-size:12px;}
  .card h3 .clear-cat{
    margin-left:auto; font-size:11px; color:var(--muted); cursor:pointer; border:none; background:none;
  }
  .card h3 .clear-cat:hover{color:var(--danger);}

  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{
    padding:6px 12px; border-radius:999px; background:var(--chip); border:1px solid var(--border);
    cursor:pointer; font-size:13px; line-height:1.5; transition:.12s; user-select:none;
  }
  .chip .en{color:var(--muted); font-size:11px; margin-left:5px;}
  .chip:hover{border-color:var(--accent);}
  .chip.on{background:var(--chip-on); border-color:var(--accent); color:#fff;}
  .chip.on .en{color:#cfc7ff;}
  .chip.custom{border-style:dashed;}

  input[type=text], textarea{
    width:100%; background:var(--panel2); border:1px solid var(--border); border-radius:8px;
    color:var(--text); padding:9px 12px; font-size:14px; font-family:inherit; outline:none;
  }
  input[type=text]:focus, textarea:focus{border-color:var(--accent);}
  .hint{font-size:12px; color:var(--muted); margin-top:6px;}

  /* preview */
  .preview-wrap{position:sticky; top:16px; align-self:start;}
  .preview{
    background:var(--panel); border:1px solid var(--accent); border-radius:var(--radius);
    padding:18px;
  }
  .preview h2{font-size:15px; margin-bottom:10px; color:var(--accent);}
  .out-toggle{display:flex; gap:6px; margin-bottom:12px;}
  .out-toggle button{
    flex:1; padding:6px 0; border-radius:8px; border:1px solid var(--border); background:var(--chip);
    color:var(--muted); cursor:pointer; font-size:13px;
  }
  .out-toggle button.on{background:var(--chip-on); color:#fff; border-color:var(--accent);}
  .prompt-box{
    background:var(--panel2); border:1px solid var(--border); border-radius:8px;
    padding:12px; font-size:14px; line-height:1.7; min-height:90px; white-space:pre-wrap;
    margin-bottom:8px; word-break:break-word;
  }
  .prompt-box.zh{font-size:14px;}
  .prompt-box .label{font-size:11px; color:var(--accent2); display:block; margin-bottom:4px;}
  .btn-row{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
  .btn{
    padding:9px 16px; border-radius:8px; border:none; cursor:pointer; font-size:14px; font-weight:600;
    background:var(--accent); color:#fff; transition:.15s;
  }
  .btn:hover{filter:brightness(1.15);}
  .btn.ghost{background:var(--chip); color:var(--text); border:1px solid var(--border);}
  .btn.small{padding:5px 10px; font-size:12px; font-weight:400;}
  .btn.danger{background:none; border:1px solid var(--border); color:var(--danger);}
  .count-badge{font-size:12px; color:var(--muted); margin-top:8px;}

  /* templates */
  .tpl-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px;}
  .tpl{
    background:var(--panel2); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px; cursor:pointer; transition:.15s;
  }
  .tpl:hover{border-color:var(--accent); transform:translateY(-2px);}
  .tpl .icon{font-size:26px;}
  .tpl h4{font-size:15px; margin:8px 0 4px;}
  .tpl p{font-size:12px; color:var(--muted); line-height:1.5;}

  /* list items (fav / history) */
  .list-item{
    background:var(--panel2); border:1px solid var(--border); border-radius:10px;
    padding:12px 14px; margin-bottom:10px;
  }
  .list-item .li-head{display:flex; align-items:center; gap:8px; margin-bottom:6px;}
  .list-item .li-name{font-weight:600; font-size:14px;}
  .list-item .li-time{font-size:11px; color:var(--muted); margin-left:auto;}
  .list-item .li-text{font-size:13px; color:var(--muted); line-height:1.6; word-break:break-word;}
  .list-item .li-btns{display:flex; gap:6px; margin-top:8px;}
  .empty{color:var(--muted); font-size:14px; padding:24px; text-align:center;}

  /* vocab manager */
  .vocab-add{display:grid; grid-template-columns:1fr 1fr auto; gap:8px; margin-top:10px;}
  @media (max-width:600px){ .vocab-add{grid-template-columns:1fr;} }

  .section-divider{
    margin:20px 0 12px; font-size:15px; font-weight:700; color:var(--accent2);
    display:flex; align-items:baseline; gap:10px; border-top:1px dashed var(--border); padding-top:16px;
  }
  .section-divider span{font-size:12px; font-weight:400; color:var(--muted);}

  .toast{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--accent); color:#fff; padding:10px 22px; border-radius:999px;
    font-size:14px; font-weight:600; opacity:0; transition:.3s; pointer-events:none; z-index:99;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header>
  <h1><span class="en">Prompt Studio</span>GPT 生圖提示詞工作室</h1>
  <span class="sub">點選元素 → 自動組成自然語言提示詞 → 複製貼給 GPT</span>
</header>

<div class="layout">

      <button class="tab" data-page="history">🕘 歷史</button>
      <button class="tab" data-page="vocab">🔧 詞庫管理</button>
    </div>

    <div class="page on" id="page-builder">
      <div class="card">
        <h3><span class="zh">✏️ 主體描述</span><span class="en">subject — 想畫什麼？可自由輸入</span></h3>
        <input type="text" id="subjectInput" placeholder="例：一位撐著透明雨傘的長髮少女（中英文皆可）">
        <div class="hint">下方也有常用主體可以直接點選，與輸入內容可並用</div>
      </div>
      <div id="categories"></div>
      <div class="btn-row">
        <button class="btn ghost" id="clearAll">🧹 全部清空</button>
        <button class="btn ghost" id="randomBtn">🎲 隨機靈感</button>
      </div>
    </div>

    <div class="page" id="page-templates">
      <div class="card">
        <h3><span class="zh">一鍵套用場景模板</span><span class="en">套用後可回「組合器」微調</span></h3>
        <div class="tpl-grid" id="tplGrid"></div>
      </div>
    </div>

    <div class="page" id="page-favorites">
      <div class="card">
        <h3><span class="zh">我的收藏</span><span class="en">儲存的組合，可隨時載回</span></h3>
        <div id="favList"></div>
      </div>
    </div>

    <div class="page" id="page-history">
      <div class="card">
        <h3><span class="zh">複製歷史</span><span class="en">最近 30 筆</span>
          <button class="clear-cat" id="clearHistory">清空歷史</button></h3>
        <div id="histList"></div>
      </div>
    </div>

    <div class="page" id="page-vocab">
      <div class="card">
        <h3><span class="zh">自訂詞庫</span><span class="en">新增的詞條會出現在組合器中（虛線框），存在瀏覽器裡</span></h3>
        <div id="vocabMgr"></div>
      </div>
    </div>
  </div>

  <div class="preview-wrap" id="previewWrap">
    <div class="sheet-bar" id="sheetBar">
      <span>🪄</span>
      <span class="snippet" id="sheetSnippet">點選元素後這裡會顯示提示詞</span>
      <button class="btn small" id="sheetCopy">📋 複製</button>
    </div>
    <div class="preview">
      <h2>🪄 即時預覽</h2>
      <div class="out-toggle">
        <button data-lang="en" class="on">English</button>
        <button data-lang="zh">中文</button>
        <button data-lang="both">雙語</button>
      </div>
      <div id="outEn" class="prompt-box"><span class="label">EN</span><span class="txt"></span></div>
      <div id="outZh" class="prompt-box zh" style="display:none"><span class="label">中文</span><span class="txt"></span></div>
      <div class="count-badge" id="selCount"></div>
      <div class="btn-row">
        <button class="btn" id="copyBtn">📋 複製提示詞</button>
        <button class="btn ghost" id="saveFavBtn">⭐ 存入收藏</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

/* ============ 狀態 ============ */
const LS = { custom:"ps_custom", fav:"ps_fav", hist:"ps_hist" };
let sel = {};            // {catId: Set(en)}
let outLang = "en";
CATEGORIES.forEach(c => sel[c.id] = new Set());

const load = k => { try{ return JSON.parse(localStorage.getItem(k)) || null; }catch(e){ return null; } };
const save = (k,v) => { try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} };
let customTerms = load(LS.custom) || {};   // {catId:[{zh,en}]}
let favorites  = load(LS.fav)  || [];
let history    = load(LS.hist) || [];

function allItems(cat){ return cat.items.concat(customTerms[cat.id]||[]); }
function findItem(catId, en){
  const cat = CATEGORIES.find(c=>c.id===catId);
  return allItems(cat).find(it=>it.en===en);
}

/* ============ 組句引擎 ============ */
function joinList(arr, conj){
  if(arr.length<=1) return arr.join("");
  return arr.slice(0,-1).join(", ") + conj + arr[arr.length-1];
}
function picked(catId){ return [...sel[catId]].map(en=>findItem(catId,en)).filter(Boolean); }

function buildEN(){
  const subjText = document.getElementById("subjectInput").value.trim();
  const subj = picked("subject").map(i=>i.en);
  if(subjText) subj.unshift(subjText);
  const g = id => picked(id).map(i=>i.en);
  const style=g("style"), action=g("action"), scene=g("scene"), light=g("lighting"),
        comp=g("composition"), cam=g("camera"), mood=g("mood"), det=g("details"),
        gender=g("gender"), age=g("age"), hairC=g("hairColor"), hairS=g("hairStyle"),
        eyes=g("eyes"), skin=g("skin"), face=g("face"), outfit=g("outfit"), acc=g("accessory");

  subj.push(...gender);
  const hasAppear = age.length||hairC.length||hairS.length||eyes.length||skin.length||face.length||outfit.length||acc.length;
  if(!subj.length && hasAppear) subj.push("a character");

  if(!subj.length && !style.length && !scene.length) return "";

  let s = "";
  const styleJoined = joinList(style," combined with ");
  const article = /^[aeiou]/i.test(styleJoined) ? "An " : "A ";
  const opener = style.length ? article + styleJoined : "An image";
  s = opener;
  if(subj.length) s += " of " + joinList(subj," and ");
  if(age.length) s += " who appears " + joinList(age," and ");
  const withList = [];
  if(hairC.length && hairS.length) withList.push(hairC.join(" and ") + " hair styled in " + joinList(hairS," and "));
  else if(hairC.length) withList.push(hairC.join(" and ") + " hair");
  else if(hairS.length) withList.push(joinList(hairS," and "));
  if(eyes.length) withList.push(joinList(eyes," and "));
  if(skin.length) withList.push(joinList(skin," and "));
  if(face.length) withList.push(joinList(face," and "));
  if(withList.length) s += ", with " + joinList(withList," and ");
  if(outfit.length) s += ", wearing " + joinList(outfit," and ");
  if(acc.length) s += ", accessorized with " + joinList(acc," and ");
  if(action.length) s += ", " + joinList(action," while ");
  if(scene.length) s += ", set in " + joinList(scene," and ");
  s += ".";

  const extra = [];
  if(light.length) extra.push("The scene is illuminated by " + joinList(light," and ") + ".");
  const compParts = [];
  if(comp.length) compParts.push("framed as a " + joinList(comp," with "));
  if(cam.length) compParts.push("shot with " + joinList(cam," and "));
  if(compParts.length) extra.push("It is " + compParts.join(", ") + ".");
  if(mood.length) extra.push("The overall atmosphere feels " + joinList(mood," and ") + ".");
  if(det.length) extra.push("Featuring " + joinList(det," and ") + ".");
  return [s].concat(extra).join(" ");
}

function buildZH(){
  const subjText = document.getElementById("subjectInput").value.trim();
  const subj = picked("subject").map(i=>i.zh);
  if(subjText) subj.unshift(subjText);
  const g = id => picked(id).map(i=>i.zh);
  const style=g("style"), action=g("action"), scene=g("scene"), light=g("lighting"),
        comp=g("composition"), cam=g("camera"), mood=g("mood"), det=g("details"),
        gender=g("gender"), age=g("age"), hairC=g("hairColor"), hairS=g("hairStyle"),
        eyes=g("eyes"), skin=g("skin"), face=g("face"), outfit=g("outfit"), acc=g("accessory");
  subj.push(...gender);
  const hasAppear = age.length||hairC.length||hairS.length||eyes.length||skin.length||face.length||outfit.length||acc.length;
  if(!subj.length && hasAppear) subj.push("一位角色");
  if(!subj.length && !style.length && !scene.length) return "";
  let s = style.length ? "一幅「" + style.join("×") + "」風格的作品" : "一幅作品";
  if(subj.length) s += "，描繪" + subj.join("與");
  if(age.length) s += "，看起來" + age.join("、");
  if(hairC.length && hairS.length) s += "，留著" + hairC.join("與") + "的" + hairS.join("與");
  else if(hairC.length) s += "，留著" + hairC.join("與") + "色頭髮";
  else if(hairS.length) s += "，留著" + hairS.join("與");
  const featList = [].concat(eyes, skin, face);
  if(featList.length) s += "，有著" + featList.join("、");
  if(outfit.length) s += "，身穿" + outfit.join("與");
  if(acc.length) s += "，配戴" + acc.join("、");
  if(action.length) s += "，正" + action.join("、");
  if(scene.length) s += "，場景位於" + scene.join("與");
  s += "。";
  const extra = [];
  if(light.length) extra.push("畫面以" + light.join("與") + "照亮。");
  const cp = [];
  if(comp.length) cp.push("採" + comp.join("加上"));
  if(cam.length) cp.push("使用" + cam.join("與"));
  if(cp.length) extra.push(cp.join("，") + "。");
  if(mood.length) extra.push("整體氛圍" + mood.join("而") + "。");
  if(det.length) extra.push("點綴" + det.join("、") + "。");
  return [s].concat(extra).join("");
}

/* ============ 渲染 ============ */
function renderCategories(){
  const wrap = document.getElementById("categories");
  wrap.innerHTML = "";
  let appearHeaderDone = false;
  let appearEnded = false;
  CATEGORIES.forEach(cat=>{
    if(cat.group==="appearance" && !appearHeaderDone){
      appearHeaderDone = true;
      const hd = document.createElement("div");
      hd.className = "section-divider";
      hd.innerHTML = '🧍 人設外觀 <span>character appearance — 描述角色長相與穿搭</span>';
      wrap.appendChild(hd);
    }
    if(cat.group!=="appearance" && appearHeaderDone && !appearEnded){
      appearEnded = true;
      const hd = document.createElement("div");
      hd.className = "section-divider";
      hd.innerHTML = '🖼️ 畫面設定 <span>scene &amp; rendering — 動作、場景、風格與鏡頭</span>';
      wrap.appendChild(hd);
    }
    const card = document.createElement("div");
    card.className = "card";
    const h = document.createElement("h3");
    h.innerHTML = '<span class="zh">'+cat.zh+'</span><span class="en">'+cat.en+'</span>';
    const clr = document.createElement("button");
    clr.className = "clear-cat"; clr.textContent = "清除";
    clr.onclick = ()=>{ sel[cat.id].clear(); renderCategories(); refresh(); };
    h.appendChild(clr);
    card.appendChild(h);
    const chips = document.createElement("div");
    chips.className = "chips";
    allItems(cat).forEach(it=>{
      const c = document.createElement("div");
      const isCustom = !(cat.items.some(x=>x.en===it.en));
      c.className = "chip" + (sel[cat.id].has(it.en) ? " on":"") + (isCustom?" custom":"");
      c.innerHTML = it.zh + '<span class="en">' + it.en + '</span>';
      c.onclick = ()=>{
        sel[cat.id].has(it.en) ? sel[cat.id].delete(it.en) : sel[cat.id].add(it.en);
        c.classList.toggle("on");
        refresh();
      };
      chips.appendChild(c);
    });
    card.appendChild(chips);
    wrap.appendChild(card);
  });
}

function refresh(){
  const en = buildEN(), zh = buildZH();
  document.querySelector("#outEn .txt").textContent = en || "（尚未選擇任何元素——點選左側分類，或輸入主體描述）";
  document.querySelector("#outZh .txt").textContent = zh || "（尚未選擇任何元素）";
  const n = CATEGORIES.reduce((a,c)=>a+sel[c.id].size,0);
  document.getElementById("selCount").textContent = "已選 " + n + " 個元素";
  document.getElementById("sheetSnippet").textContent =
    en ? en : "點選元素後這裡會顯示提示詞";
}

function setOutLang(lang){
  outLang = lang;
  document.querySelectorAll(".out-toggle button").forEach(b=>b.classList.toggle("on", b.dataset.lang===lang));
  document.getElementById("outEn").style.display = (lang==="en"||lang==="both") ? "block":"none";
  document.getElementById("outZh").style.display = (lang==="zh"||lang==="both") ? "block":"none";
}

/* ============ 複製 / 收藏 / 歷史 ============ */
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._tm); t._tm = setTimeout(()=>t.classList.remove("show"), 1800);
}
function copyText(txt){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast("已複製 ✓")).catch(()=>fallbackCopy(txt));
  } else fallbackCopy(txt);
}
function fallbackCopy(txt){
  const ta = document.createElement("textarea");
  ta.value = txt; document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); toast("已複製 ✓"); }catch(e){ toast("複製失敗，請手動選取"); }
  document.body.removeChild(ta);
}
function currentOutput(){
  const en = buildEN(), zh = buildZH();
  if(outLang==="zh") return zh;
  if(outLang==="both") return en + "\n\n" + zh;
  return en;
}
function snapshotSel(){
  const o = {};
  CATEGORIES.forEach(c=>o[c.id]=[...sel[c.id]]);
  return { sel:o, subject:document.getElementById("subjectInput").value };
}
function applySnapshot(snap){
  CATEGORIES.forEach(c=>{ sel[c.id] = new Set(snap.sel[c.id]||[]); });
  document.getElementById("subjectInput").value = snap.subject || "";
  renderCategories(); refresh();
}

function renderFavs(){
  const wrap = document.getElementById("favList");
  wrap.innerHTML = "";
  if(!favorites.length){ wrap.innerHTML = '<div class="empty">還沒有收藏。在組合器選好元素後，按「⭐ 存入收藏」。</div>'; return; }
  favorites.forEach((f,i)=>{
    const d = document.createElement("div");
    d.className = "list-item";
    d.innerHTML = '<div class="li-head"><span class="li-name">⭐ '+escapeHtml(f.name)+'</span>'
      + '<span class="li-time">'+f.time+'</span></div>'
      + '<div class="li-text">'+escapeHtml(f.preview)+'</div>';
    const btns = document.createElement("div");
    btns.className = "li-btns";
    const b1 = document.createElement("button"); b1.className="btn small"; b1.textContent="載入";
    b1.onclick = ()=>{ applySnapshot(f.snap); switchPage("builder"); toast("已載入收藏"); };
    const b2 = document.createElement("button"); b2.className="btn small ghost"; b2.textContent="複製";
    b2.onclick = ()=>copyText(f.preview);
    const b3 = document.createElement("button"); b3.className="btn small danger"; b3.textContent="刪除";
    b3.onclick = ()=>{ favorites.splice(i,1); save(LS.fav,favorites); renderFavs(); };
    btns.append(b1,b2,b3); d.appendChild(btns); wrap.appendChild(d);
  });
}

function renderHistory(){
  const wrap = document.getElementById("histList");
  wrap.innerHTML = "";
  if(!history.length){ wrap.innerHTML = '<div class="empty">還沒有歷史紀錄。每次按「複製提示詞」都會自動記錄。</div>'; return; }
  history.forEach((h,i)=>{
    const d = document.createElement("div");
    d.className = "list-item";
    d.innerHTML = '<div class="li-head"><span class="li-time">'+h.time+'</span></div>'
      + '<div class="li-text">'+escapeHtml(h.text)+'</div>';
    const btns = document.createElement("div"); btns.className="li-btns";
    const b = document.createElement("button"); b.className="btn small ghost"; b.textContent="再次複製";
    b.onclick = ()=>copyText(h.text);
    btns.appendChild(b); d.appendChild(btns); wrap.appendChild(d);
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}
function nowStr(){
  const d = new Date();
  const p = n=>String(n).padStart(2,"0");
  return d.getFullYear()+"/"+p(d.getMonth()+1)+"/"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes());
}

      toast("已套用模板：" + t.name);

/* ============ 詞庫管理 ============ */
function renderVocab(){
  const wrap = document.getElementById("vocabMgr");
  wrap.innerHTML = "";
  CATEGORIES.forEach(cat=>{
    const box = document.createElement("div");
    box.className = "card";
    box.style.background = "var(--panel2)";
    const h = document.createElement("h3");
    h.innerHTML = '<span class="zh">'+cat.zh+'</span>';
    box.appendChild(h);
    const list = document.createElement("div");
    list.className = "chips";
    (customTerms[cat.id]||[]).forEach((it,idx)=>{
      const c = document.createElement("div");
      c.className = "chip custom";
      c.innerHTML = it.zh + '<span class="en">' + escapeHtml(it.en) + '</span> ✕';
      c.title = "點擊刪除";
      c.onclick = ()=>{
        customTerms[cat.id].splice(idx,1);
        sel[cat.id].delete(it.en);
        save(LS.custom, customTerms);
        renderVocab(); renderCategories(); refresh();
      };
      list.appendChild(c);
    });
    if(!(customTerms[cat.id]||[]).length){
      const e = document.createElement("span");
      e.style.cssText = "color:var(--muted);font-size:12px;";
      e.textContent = "（尚無自訂詞條）";
      list.appendChild(e);
    }
    box.appendChild(list);
    const add = document.createElement("div");
    add.className = "vocab-add";
    const iz = document.createElement("input"); iz.type="text"; iz.placeholder="中文，例：星空下";
    const ie = document.createElement("input"); ie.type="text"; ie.placeholder="English, e.g. under a starry sky";
    const ab = document.createElement("button"); ab.className="btn small"; ab.textContent="＋ 新增";
    ab.onclick = ()=>{
      const zh = iz.value.trim(), en = ie.value.trim();
      if(!zh || !en){ toast("中英文都要填喔"); return; }
      customTerms[cat.id] = customTerms[cat.id] || [];
      customTerms[cat.id].push({zh,en});
      save(LS.custom, customTerms);
      iz.value=""; ie.value="";
      renderVocab(); renderCategories();
      toast("已新增到「"+cat.zh.replace(/^\S+\s/,"")+"」");
    };
    add.append(iz,ie,ab);
    box.appendChild(add);
    wrap.appendChild(box);
  });
}

/* ============ 分頁與事件 ============ */
function switchPage(id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on", t.dataset.page===id));
  document.querySelectorAll(".page").forEach(p=>p.classList.toggle("on", p.id==="page-"+id));
  if(id==="favorites") renderFavs();
  if(id==="history") renderHistory();
  if(id==="vocab") renderVocab();
}
document.querySelectorAll(".tab").forEach(t=>t.onclick = ()=>switchPage(t.dataset.page));
document.querySelectorAll(".out-toggle button").forEach(b=>b.onclick = ()=>setOutLang(b.dataset.lang));
document.getElementById("subjectInput").addEventListener("input", refresh);

document.getElementById("copyBtn").onclick = ()=>{
  const txt = currentOutput();
  if(!txt.trim()){ toast("先選一些元素吧"); return; }
  copyText(txt);
  history.unshift({text:txt, time:nowStr()});
  history = history.slice(0,30);
  save(LS.hist, history);
};
document.getElementById("saveFavBtn").onclick = ()=>{
  const en = buildEN();
  if(!en){ toast("先選一些元素吧"); return; }
  const name = prompt("幫這個組合取個名字：", "我的組合 " + (favorites.length+1));
  if(name===null) return;
  favorites.unshift({ name:name||("組合"+(favorites.length+1)), snap:snapshotSel(), preview:en, time:nowStr() });
  save(LS.fav, favorites);
  toast("已存入收藏 ⭐");
};
document.getElementById("clearAll").onclick = ()=>{
  CATEGORIES.forEach(c=>sel[c.id].clear());
  document.getElementById("subjectInput").value = "";
  renderCategories(); refresh();
};
document.getElementById("clearHistory").onclick = ()=>{
  if(!history.length) return;
  if(confirm("確定清空所有歷史紀錄？")){ history=[]; save(LS.hist,history); renderHistory(); }
};
document.getElementById("randomBtn").onclick = ()=>{
  const pickRand = arr => arr[Math.floor(Math.random()*arr.length)].en;
  const isPerson = Math.random()<0.6;   // 六成機率抽「人物」組合，含外觀
  CATEGORIES.forEach(c=>{
    sel[c.id].clear();
    if(c.group==="appearance"){
      if(!isPerson) return;                          // 非人物就不抽外觀
      if(c.id!=="gender" && Math.random()<0.4) return; // 其餘外觀四成機率跳過
      sel[c.id].add(pickRand(allItems(c)));
      return;
    }
    if(c.id==="subject" && isPerson) return;         // 人物由性別分類擔任主體
    if(c.id==="camera" && Math.random()<0.5) return; // camera 一半機率不選
    sel[c.id].add(pickRand(allItems(c)));
  });
  renderCategories(); refresh();
  toast("🎲 隨機組合完成，不喜歡再按一次");
};

/* ============ 手機底部抽屜 ============ */
document.getElementById("sheetBar").onclick = (e)=>{
  if(e.target.id==="sheetCopy") return;
  document.getElementById("previewWrap").classList.toggle("open");
};
document.getElementById("sheetCopy").onclick = (e)=>{
  e.stopPropagation();
  document.getElementById("copyBtn").click();
};

/* ============ 啟動 ============ */
renderCategories();
renderTemplates();
refresh();
</script>
</body>
</html>
