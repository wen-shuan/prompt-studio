<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Prompt Studio — GPT 生圖提示詞工作室</title>
<style>
  :root{
    --bg:#0f1117; --panel:#181b25; --panel2:#1f2330; --border:#2a2f40;
    --text:#e8eaf2; --muted:#8b91a7; --accent:#8b7cf6; --accent2:#5eead4;
    --chip:#242938; --chip-on:#3b3170; --danger:#f87171;
    --radius:12px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
    min-height:100vh;
  }
  header{
    padding:20px 28px 12px; display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
  }
  header h1{font-size:22px; font-weight:700; letter-spacing:.5px;}
  header h1 .en{color:var(--accent); margin-right:8px;}
  header .sub{color:var(--muted); font-size:13px;}
  .layout{
    display:grid; grid-template-columns:1fr 400px; gap:18px;
    padding:0 28px 40px; max-width:1500px; margin:0 auto;
  }
  /* ===== 手機版：預覽變成底部抽屜 ===== */
  .sheet-bar{display:none;}
  @media (max-width:980px){
    .layout{grid-template-columns:1fr; padding-bottom:110px;}
    .preview-wrap{position:fixed!important; top:auto!important; bottom:0; left:0; right:0; z-index:50;}
    .sheet-bar{
      display:flex; align-items:center; gap:10px;
      background:var(--panel); border:1px solid var(--accent); border-bottom:none;
      border-radius:14px 14px 0 0; padding:12px 14px; cursor:pointer;
      box-shadow:0 -6px 24px rgba(0,0,0,.45);
    }
    .sheet-bar .snippet{
      flex:1; font-size:12px; color:var(--muted); white-space:nowrap;
      overflow:hidden; text-overflow:ellipsis;
    }
    .preview{display:none; border-radius:0; border-top:none;
      max-height:60vh; overflow-y:auto; -webkit-overflow-scrolling:touch;
      padding-bottom:calc(18px + env(safe-area-inset-bottom));}
    .sheet-bar{padding-bottom:calc(12px + env(safe-area-inset-bottom));}
    .preview-wrap.open .sheet-bar{padding-bottom:12px;}
    .preview-wrap.open .preview{display:block;}
    .chip{padding:8px 14px;}  /* 加大觸控面積 */
  }

  /* tabs */
  .tabs{display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap;}
  .tab{
    padding:8px 16px; border-radius:999px; background:var(--chip); border:1px solid var(--border);
    color:var(--muted); cursor:pointer; font-size:14px; transition:.15s;
  }
  .tab:hover{color:var(--text);}
  .tab.on{background:var(--chip-on); color:#fff; border-color:var(--accent);}
  .page{display:none;}
  .page.on{display:block;}

  .card{
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px 18px; margin-bottom:14px;
  }
  .card h3{font-size:14px; margin-bottom:10px; display:flex; align-items:center; gap:8px;}
  .card h3 .zh{font-weight:700;}
  .card h3 .en{color:var(--muted); font-weight:400; font-size:12px;}
  .card h3 .clear-cat{
    margin-left:auto; font-size:11px; color:var(--muted); cursor:pointer; border:none; background:none;
  }
  .card h3 .clear-cat:hover{color:var(--danger);}

  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{
    padding:6px 12px; border-radius:999px; background:var(--chip); border:1px solid var(--border);
    cursor:pointer; font-size:13px; line-height:1.5; transition:.12s; user-select:none;
  }
  .chip .en{color:var(--muted); font-size:11px; margin-left:5px;}
  .chip:hover{border-color:var(--accent);}
  .chip.on{background:var(--chip-on); border-color:var(--accent); color:#fff;}
  .chip.on .en{color:#cfc7ff;}
  .chip.custom{border-style:dashed;}

  input[type=text], textarea{
    width:100%; background:var(--panel2); border:1px solid var(--border); border-radius:8px;
    color:var(--text); padding:9px 12px; font-size:14px; font-family:inherit; outline:none;
  }
  input[type=text]:focus, textarea:focus{border-color:var(--accent);}
  .hint{font-size:12px; color:var(--muted); margin-top:6px;}

  /* preview */
  .preview-wrap{position:sticky; top:16px; align-self:start;}
  .preview{
    background:var(--panel); border:1px solid var(--accent); border-radius:var(--radius);
    padding:18px;
  }
  .preview h2{font-size:15px; margin-bottom:10px; color:var(--accent);}
  .out-toggle{display:flex; gap:6px; margin-bottom:12px;}
  .out-toggle button{
    flex:1; padding:6px 0; border-radius:8px; border:1px solid var(--border); background:var(--chip);
    color:var(--muted); cursor:pointer; font-size:13px;
  }
  .out-toggle button.on{background:var(--chip-on); color:#fff; border-color:var(--accent);}
  .prompt-box{
    background:var(--panel2); border:1px solid var(--border); border-radius:8px;
    padding:12px; font-size:14px; line-height:1.7; min-height:90px; white-space:pre-wrap;
    margin-bottom:8px; word-break:break-word;
  }
  .prompt-box.zh{font-size:14px;}
  .prompt-box .label{font-size:11px; color:var(--accent2); display:block; margin-bottom:4px;}
  .btn-row{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
  .btn{
    padding:9px 16px; border-radius:8px; border:none; cursor:pointer; font-size:14px; font-weight:600;
    background:var(--accent); color:#fff; transition:.15s;
  }
  .btn:hover{filter:brightness(1.15);}
  .btn.ghost{background:var(--chip); color:var(--text); border:1px solid var(--border);}
  .btn.small{padding:5px 10px; font-size:12px; font-weight:400;}
  .btn.danger{background:none; border:1px solid var(--border); color:var(--danger);}
  .count-badge{font-size:12px; color:var(--muted); margin-top:8px;}

  /* templates */
  .tpl-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px;}
  .tpl{
    background:var(--panel2); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px; cursor:pointer; transition:.15s;
  }
  .tpl:hover{border-color:var(--accent); transform:translateY(-2px);}
  .tpl .icon{font-size:26px;}
  .tpl h4{font-size:15px; margin:8px 0 4px;}
  .tpl p{font-size:12px; color:var(--muted); line-height:1.5;}

  /* list items (fav / history) */
  .list-item{
    background:var(--panel2); border:1px solid var(--border); border-radius:10px;
    padding:12px 14px; margin-bottom:10px;
  }
  .list-item .li-head{display:flex; align-items:center; gap:8px; margin-bottom:6px;}
  .list-item .li-name{font-weight:600; font-size:14px;}
  .list-item .li-time{font-size:11px; color:var(--muted); margin-left:auto;}
  .list-item .li-text{font-size:13px; color:var(--muted); line-height:1.6; word-break:break-word;}
  .list-item .li-btns{display:flex; gap:6px; margin-top:8px;}
  .empty{color:var(--muted); font-size:14px; padding:24px; text-align:center;}

  /* vocab manager */
  .vocab-add{display:grid; grid-template-columns:1fr 1fr auto; gap:8px; margin-top:10px;}
  @media (max-width:600px){ .vocab-add{grid-template-columns:1fr;} }

  .section-divider{
    margin:20px 0 12px; font-size:15px; font-weight:700; color:var(--accent2);
    display:flex; align-items:baseline; gap:10px; border-top:1px dashed var(--border); padding-top:16px;
  }
  .section-divider span{font-size:12px; font-weight:400; color:var(--muted);}

  .sheet-backdrop{display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:49;}
  .sheet-backdrop.show{display:block;}
  .sheet-bar .chev{font-size:12px; color:var(--accent); white-space:nowrap; font-weight:700;}
  .char-ctrl{margin-left:auto; display:flex; gap:6px;}
  .mini-btn{padding:5px 14px; border-radius:999px; background:var(--chip); border:1px solid var(--border); color:var(--muted); cursor:pointer; font-size:13px;}
  .mini-btn.on{background:var(--chip-on); color:#fff; border-color:var(--accent);}
  .char-tabs{display:flex; gap:8px; align-items:center; margin:0 0 12px;}
  .char-note{font-size:12px; color:var(--accent2);}

  .toast{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--accent); color:#fff; padding:10px 22px; border-radius:999px;
    font-size:14px; font-weight:600; opacity:0; transition:.3s; pointer-events:none; z-index:99;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header>
  <h1><span class="en">Prompt Studio</span>GPT 生圖提示詞工作室</h1>
  <span class="sub">點選元素 → 自動組成自然語言提示詞 → 複製貼給 GPT</span>
</header>

<div class="layout">

      <button class="tab" data-page="templates">📚 模板庫</button>
      <button class="tab" data-page="favorites">⭐ 收藏</button>
      <button class="tab" data-page="history">🕘 歷史</button>
      <button class="tab" data-page="vocab">🔧 詞庫管理</button>
    </div>

    <div class="page on" id="page-builder">
      <div class="card">
        <h3><span class="zh">✏️ 主體描述</span><span class="en">subject — 想畫什麼？可自由輸入</span></h3>
        <input type="text" id="subjectInput" placeholder="例：黑髮的那位比銀髮的高半個頭（中英文皆可）">
        <div class="hint">單人：直接在下方人設外觀區選。雙人：把人設外觀切換成「雙人」，用角色 1／角色 2 頁籤分別設定。其他想補充的細節寫在這裡</div>
      </div>
      <div id="categories"></div>
      <div class="btn-row">
        <button class="btn ghost" id="clearAll">🧹 全部清空</button>
        <button class="btn ghost" id="randomBtn">🎲 隨機靈感</button>
      </div>
    </div>

    <div class="page" id="page-templates">
      <div class="card">
        <h3><span class="zh">一鍵套用場景模板</span><span class="en">套用後可回「組合器」微調</span></h3>
        <div class="tpl-grid" id="tplGrid"></div>
      </div>
    </div>

    <div class="page" id="page-favorites">
      <div class="card">
        <h3><span class="zh">我的收藏</span><span class="en">儲存的組合，可隨時載回</span></h3>
        <div id="favList"></div>
      </div>
    </div>

    <div class="page" id="page-history">
      <div class="card">
        <h3><span class="zh">複製歷史</span><span class="en">最近 30 筆</span>
          <button class="clear-cat" id="clearHistory">清空歷史</button></h3>
        <div id="histList"></div>
      </div>
    </div>

    <div class="page" id="page-vocab">
      <div class="card">
        <h3><span class="zh">自訂詞庫</span><span class="en">新增的詞條會出現在組合器中（虛線框），存在瀏覽器裡</span></h3>
        <div id="vocabMgr"></div>
      </div>
    </div>
  </div>

  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="preview-wrap" id="previewWrap">
    <div class="sheet-bar" id="sheetBar">
      <span class="chev" id="sheetChev">▲ 展開</span>
      <span class="snippet" id="sheetSnippet">點選元素後這裡會顯示提示詞</span>
      <button class="btn small" id="sheetCopy">📋 複製</button>
    </div>
    <div class="preview">
      <h2>🪄 即時預覽</h2>
      <div class="out-toggle">
        <button data-lang="en" class="on">English</button>
        <button data-lang="zh">中文</button>
        <button data-lang="both">雙語</button>
      </div>
      <div id="outEn" class="prompt-box"><span class="label">EN</span><span class="txt"></span></div>
      <div id="outZh" class="prompt-box zh" style="display:none"><span class="label">中文</span><span class="txt"></span></div>
      <div class="count-badge" id="selCount"></div>
      <div class="btn-row">
        <button class="btn" id="copyBtn">📋 複製提示詞</button>
        <button class="btn ghost" id="saveFavBtn">⭐ 存入收藏</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

CATEGORIES.forEach(c => {
  if(APPEAR.has(c.id)){ selA[c.id]=new Set(); selB[c.id]=new Set(); }

});
function storeFor(catId){ return APPEAR.has(catId) ? (charMode==="duo" && activeChar==="B" ? selB : selA) : sel; }

function findItem(catId, en){
  const cat = CATEGORIES.find(c=>c.id===catId);
  return allItems(cat).find(it=>it.en===en);
}

/* ============ 組句引擎 ============ */
function joinList(arr, conj){
  if(arr.length<=1) return arr.join("");
  return arr.slice(0,-1).join(", ") + conj + arr[arr.length-1];
}
function picked(catId){ const m = APPEAR.has(catId) ? selA : sel; return [...m[catId]].map(en=>findItem(catId,en)).filter(Boolean); }
function pickedM(m,catId){ return [...(m[catId]||[])].map(en=>findItem(catId,en)).filter(Boolean); }

function hairPhraseEN(hairC, hairT, hairS){
  let hairPhrase = "";
  const tech = hairT[0] || "";
  const c0 = hairC[0], cRest = hairC.slice(1);
  const cRestJ = joinList(cRest," and ");
  if(tech==="gradient dye"){
    if(hairC.length>=2) hairPhrase = c0+" hair with a smooth gradient fading into "+cRestJ+" toward the tips";
    else if(hairC.length===1) hairPhrase = c0+" gradient-dyed hair";
    else hairPhrase = "beautifully gradient-dyed hair";
  } else if(tech==="highlight streaks"){
    if(hairC.length>=2) hairPhrase = c0+" hair with "+cRestJ+" highlights streaked through";
    else if(hairC.length===1) hairPhrase = "hair with "+c0+" highlights streaked through";
    else hairPhrase = "hair with subtle highlights";
  } else if(tech==="hidden underlayer dye"){
    if(hairC.length>=2) hairPhrase = c0+" hair with a hidden "+cRestJ+" underlayer";
    else if(hairC.length===1) hairPhrase = "hair with a hidden "+c0+" underlayer";
    else hairPhrase = "hair with a hidden dyed underlayer";
  } else if(tech==="dip-dyed ends"){
    if(hairC.length>=2) hairPhrase = c0+" hair with the ends dip-dyed in "+cRestJ;
    else if(hairC.length===1) hairPhrase = "hair with "+c0+" dip-dyed ends";
    else hairPhrase = "hair with dip-dyed ends";
  } else if(hairC.length){
    hairPhrase = joinList(hairC," and ")+" hair";
    if(tech) hairPhrase += " with "+tech;
  } else if(tech){
    hairPhrase = "hair with "+tech;
  }
  if(hairPhrase && hairS.length) return hairPhrase+", styled in "+joinList(hairS," and ");
  if(hairPhrase) return hairPhrase;
  if(hairS.length) return joinList(hairS," and ");
  return "";
}

function appearEN(m){
  const p = id => pickedM(m,id).map(i=>i.en);
  const gender=p("gender"), age=p("age"),
        hairC=p("hairColor"), hairT=p("hairTech"),
        hairS=p("hairStyle").concat(p("hairStyleM")),
        eyes=p("eyes"), skin=p("skin"), face=p("face"),
        outfit=p("outfit"), top=p("topWear"), bottom=p("bottomWear"),
        shoes=p("shoes"), acc=p("accessory");
  let tail = "";
  if(age.length) tail += " who appears " + joinList(age," and ");
  const withList = [];
  const hp = hairPhraseEN(hairC, hairT, hairS);
  if(hp) withList.push(hp);
  if(eyes.length) withList.push(joinList(eyes," and "));
  if(skin.length) withList.push(joinList(skin," and "));
  if(face.length) withList.push(joinList(face," and "));
  if(withList.length) tail += ", with " + joinList(withList,", and ");
  const wearList = outfit.slice();
  if(top.length && bottom.length) wearList.push(joinList(top," and ") + " paired with " + joinList(bottom," and "));
  else if(top.length) wearList.push(joinList(top," and "));
  else if(bottom.length) wearList.push(joinList(bottom," and "));
  if(shoes.length) wearList.push(joinList(shoes," and "));
  if(wearList.length) tail += ", wearing " + joinList(wearList,", and ");
  if(acc.length) tail += ", accessorized with " + joinList(acc," and ");
  return { noun: gender.length ? joinList(gender," and ") : "", tail, any: !!(gender.length || tail) };
}

function charSentEN(label, d){
  if(!d.any) return "";
  if(d.noun) return label + " is " + d.noun + d.tail + ".";
  let t = d.tail;
  if(t.indexOf(" who appears")===0) t = " appears" + t.slice(12);
  else if(t.indexOf(", with ")===0) t = " has " + t.slice(7);
  else if(t.indexOf(", wearing ")===0) t = " is wearing " + t.slice(10);
  else if(t.indexOf(", accessorized with ")===0) t = " is accessorized with " + t.slice(20);
  return label + t + ".";
}

function buildEN(){
  const subjText = document.getElementById("subjectInput").value.trim();
  const g = id => picked(id).map(i=>i.en);
  const style=g("style"), scene=g("scene"), light=g("lighting"),
        comp=g("composition"), cam=g("camera"), det=g("details");
  const action=g("action"); action.push(...g("duoAction"));
  const mood=g("mood"); mood.push(...g("duoMood"));
  const subj = [];
  if(subjText) subj.push(subjText);
  subj.push(...g("subject"));
  const A = appearEN(selA), B = appearEN(selB);
  let inlineTail = "";
  if(charMode==="solo"){
    if(A.noun) subj.push(A.noun);
    if(!subj.length && A.any) subj.push("a character");
    inlineTail = A.tail;
  } else {
    if(!subj.length && (A.any||B.any)){
      if(A.noun || B.noun) subj.push((A.noun||"a character")+" and "+(B.noun||"another character"));
      else subj.push("two characters");
    }
  }
  if(!subj.length && !style.length && !scene.length) return "";
  const styleJoined = joinList(style," combined with ");
  const article = /^[aeiou]/i.test(styleJoined) ? "An " : "A ";
  let s = style.length ? article + styleJoined : "An image";
  if(subj.length) s += " of " + joinList(subj," and ");
  s += inlineTail;
  if(action.length) s += ", " + joinList(action," while ");
  if(scene.length){
    const sceneJ = joinList(scene," and ");
    s += /^(under |in |inside |on |at |in front of )/i.test(sceneJ) ? ", set " + sceneJ : ", set in " + sceneJ;
  }
  s += ".";
  const extra = [];
  if(charMode==="duo"){
    const sa = charSentEN("The first character", A);
    const sb = charSentEN("The second character", B);
    if(sa) extra.push(sa);
    if(sb) extra.push(sb);
  }
  if(light.length) extra.push("The scene is illuminated by " + joinList(light," and ") + ".");
  const compParts = [];
  if(comp.length) compParts.push("framed as a " + joinList(comp," with "));
  if(cam.length) compParts.push("shot with " + joinList(cam," and "));
  if(compParts.length) extra.push("It is " + compParts.join(", ") + ".");
  if(mood.length) extra.push("The overall atmosphere feels " + joinList(mood," and ") + ".");
  if(det.length) extra.push("Featuring " + joinList(det," and ") + ".");
  return [s].concat(extra).join(" ");
}

function hairPhraseZH(hairC, hairT, hairS){
  const techZ = hairT[0] || "";
  let hairZ = "";
  const z0 = hairC[0], zRest = hairC.slice(1).join("與");
  if(techZ.startsWith("漸層染")){
    if(hairC.length>=2) hairZ = "由" + z0 + "漸變到" + zRest + "的漸層染髮";
    else if(hairC.length===1) hairZ = z0 + "色系的漸層染髮";
    else hairZ = "漸層染髮";
  } else if(techZ.startsWith("挑染")){
    if(hairC.length>=2) hairZ = z0 + "底髮加上" + zRest + "挑染";
    else if(hairC.length===1) hairZ = "帶" + z0 + "挑染的頭髮";
    else hairZ = "帶挑染的頭髮";
  } else if(techZ.startsWith("內層染")){
    if(hairC.length>=2) hairZ = z0 + "底髮、內層染成" + zRest;
    else if(hairC.length===1) hairZ = "內層染成" + z0 + "的頭髮";
    else hairZ = "有內層染的頭髮";
  } else if(techZ.startsWith("髮尾染")){
    if(hairC.length>=2) hairZ = z0 + "底髮、髮尾染成" + zRest;
    else if(hairC.length===1) hairZ = "髮尾染成" + z0 + "的頭髮";
    else hairZ = "有髮尾染的頭髮";
  } else if(hairC.length){
    hairZ = hairC.join("與") + "色頭髮";
  } else if(techZ){
    hairZ = techZ + "的頭髮";
  }
  if(hairZ && hairS.length) return "留著" + hairZ + "、梳成" + hairS.join("與");
  if(hairZ) return "留著" + hairZ;
  if(hairS.length) return "留著" + hairS.join("與");
  return "";
}

function appearZH(m){
  const p = id => pickedM(m,id).map(i=>i.zh);
  const gender=p("gender"), age=p("age"), hairC=p("hairColor"), hairT=p("hairTech"),
        hairS=p("hairStyle").concat(p("hairStyleM")), eyes=p("eyes"), skin=p("skin"), face=p("face"),
        outfit=p("outfit"), top=p("topWear"), bottom=p("bottomWear"), shoes=p("shoes"), acc=p("accessory");
  let tail = "";
  if(age.length) tail += "，看起來" + age.join("、");
  const hp = hairPhraseZH(hairC, hairT, hairS);
  if(hp) tail += "，" + hp;
  const featList = [].concat(eyes, skin, face);
  if(featList.length) tail += "，有著" + featList.join("、");
  const wearZ = outfit.slice();
  if(top.length && bottom.length) wearZ.push(top.join("與") + "搭配" + bottom.join("與"));
  else if(top.length) wearZ.push(top.join("與"));
  else if(bottom.length) wearZ.push(bottom.join("與"));
  if(wearZ.length) tail += "，身穿" + wearZ.join("、");
  if(shoes.length) tail += "，腳踩" + shoes.join("與");
  if(acc.length) tail += "，配戴" + acc.join("、");
  return { noun: gender.join("與"), tail, any: !!(gender.length || tail) };
}

function buildZH(){
  const subjText = document.getElementById("subjectInput").value.trim();
  const g = id => picked(id).map(i=>i.zh);
  const style=g("style"), scene=g("scene"), light=g("lighting"),
        comp=g("composition"), cam=g("camera"), det=g("details");
  const action=g("action"); action.push(...g("duoAction"));
  const mood=g("mood"); mood.push(...g("duoMood"));
  const subj = [];
  if(subjText) subj.push(subjText);
  subj.push(...g("subject"));
  const A = appearZH(selA), B = appearZH(selB);
  let inlineTail = "";
  if(charMode==="solo"){
    if(A.noun) subj.push(A.noun);
    if(!subj.length && A.any) subj.push("一位角色");
    inlineTail = A.tail;
  } else {
    if(!subj.length && (A.any||B.any)){
      if(A.noun||B.noun) subj.push((A.noun||"一位角色")+"與"+(B.noun||"另一位角色"));
      else subj.push("兩位角色");
    }
  }
  if(!subj.length && !style.length && !scene.length) return "";
  let s = style.length ? "一幅「" + style.join("×") + "」風格的作品" : "一幅作品";
  if(subj.length) s += "，描繪" + subj.join("與");
  s += inlineTail;
  if(action.length) s += "，正" + action.join("、");
  if(scene.length) s += "，場景位於" + scene.join("與");
  s += "。";
  const extra = [];
  if(charMode==="duo"){
    if(A.any) extra.push("第一位角色" + (A.noun ? "是" + A.noun : "") + A.tail + "。");
    if(B.any) extra.push("第二位角色" + (B.noun ? "是" + B.noun : "") + B.tail + "。");
  }
  if(light.length) extra.push("畫面以" + light.join("與") + "照亮。");
  const cp = [];
  if(comp.length) cp.push("採" + comp.join("加上"));
  if(cam.length) cp.push("使用" + cam.join("與"));
  if(cp.length) extra.push(cp.join("，") + "。");
  if(mood.length) extra.push("整體氛圍" + mood.join("而") + "。");
  if(det.length) extra.push("點綴" + det.join("、") + "。");
  return [s].concat(extra).join("");
}

/* ============ 渲染 ============ */
function renderCategories(){
  const wrap = document.getElementById("categories");
  wrap.innerHTML = "";
  let appearHeaderDone = false;
  let appearEnded = false;
  CATEGORIES.forEach(cat=>{
    if(cat.group==="appearance" && !appearHeaderDone){
      appearHeaderDone = true;
      const hd = document.createElement("div");
      hd.className = "section-divider";
      hd.innerHTML = '🧍 人設外觀 <span>單人直接選；雙人請切「雙人」分別設定</span>';
      const mkBtn = (txt,on,fn)=>{ const b=document.createElement("button"); b.className="mini-btn"+(on?" on":""); b.textContent=txt; b.onclick=fn; return b; };
      const ctrl = document.createElement("div");
      ctrl.className = "char-ctrl";
      ctrl.appendChild(mkBtn("單人", charMode==="solo", ()=>{ charMode="solo"; activeChar="A"; renderCategories(); refresh(); }));
      ctrl.appendChild(mkBtn("雙人", charMode==="duo", ()=>{ charMode="duo"; renderCategories(); refresh(); }));
      hd.appendChild(ctrl);
      wrap.appendChild(hd);
      if(charMode==="duo"){
        const tabs = document.createElement("div");
        tabs.className = "char-tabs";
        tabs.appendChild(mkBtn("👤 角色 1", activeChar==="A", ()=>{ activeChar="A"; renderCategories(); refresh(); }));
        tabs.appendChild(mkBtn("👤 角色 2", activeChar==="B", ()=>{ activeChar="B"; renderCategories(); refresh(); }));
        const note = document.createElement("span");
        note.className = "char-note";
        note.textContent = "正在編輯角色 " + (activeChar==="A"?"1":"2") + " 的外觀";
        tabs.appendChild(note);
        wrap.appendChild(tabs);
      }
    }
    if(cat.group!=="appearance" && appearHeaderDone && !appearEnded){
      appearEnded = true;
      const hd = document.createElement("div");
      hd.className = "section-divider";
      hd.innerHTML = '🖼️ 畫面設定 <span>scene &amp; rendering — 動作、場景、風格與鏡頭</span>';
      wrap.appendChild(hd);
    }
    const card = document.createElement("div");
    card.className = "card";
    const store = storeFor(cat.id);
    const h = document.createElement("h3");
    h.innerHTML = '<span class="zh">'+cat.zh+'</span><span class="en">'+cat.en+'</span>';
    const clr = document.createElement("button");
    clr.className = "clear-cat"; clr.textContent = "清除";
    clr.onclick = ()=>{ storeFor(cat.id).clear(); renderCategories(); refresh(); };
    h.appendChild(clr);
    card.appendChild(h);
    const chips = document.createElement("div");
    chips.className = "chips";
    allItems(cat).forEach(it=>{
      const c = document.createElement("div");
      const isCustom = !(cat.items.some(x=>x.en===it.en));
      c.className = "chip" + (store.has(it.en) ? " on":"") + (isCustom?" custom":"");
      c.innerHTML = it.zh + '<span class="en">' + it.en + '</span>';
      c.onclick = ()=>{
        store.has(it.en) ? store.delete(it.en) : store.add(it.en);
        c.classList.toggle("on");
        refresh();
      };
      chips.appendChild(c);
    });
    card.appendChild(chips);
    wrap.appendChild(card);
  });
}

function refresh(){
  const en = buildEN(), zh = buildZH();
  document.querySelector("#outEn .txt").textContent = en || "（尚未選擇任何元素——點選左側分類，或輸入主體描述）";
  document.querySelector("#outZh .txt").textContent = zh || "（尚未選擇任何元素）";
  const n = CATEGORIES.reduce((a,c)=>{
    if(APPEAR.has(c.id)) return a + selA[c.id].size + (charMode==="duo" ? selB[c.id].size : 0);
    return a + sel[c.id].size;
  },0);
  document.getElementById("selCount").textContent = "已選 " + n + " 個元素";
  document.getElementById("sheetSnippet").textContent =
    en ? en : "點選元素後這裡會顯示提示詞";
}

function setOutLang(lang){
  outLang = lang;
  document.querySelectorAll(".out-toggle button").forEach(b=>b.classList.toggle("on", b.dataset.lang===lang));
  document.getElementById("outEn").style.display = (lang==="en"||lang==="both") ? "block":"none";
  document.getElementById("outZh").style.display = (lang==="zh"||lang==="both") ? "block":"none";
}

/* ============ 複製 / 收藏 / 歷史 ============ */
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._tm); t._tm = setTimeout(()=>t.classList.remove("show"), 1800);
}
function copyText(txt){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast("已複製 ✓")).catch(()=>fallbackCopy(txt));
  } else fallbackCopy(txt);
}
function fallbackCopy(txt){
  const ta = document.createElement("textarea");
  ta.value = txt; document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); toast("已複製 ✓"); }catch(e){ toast("複製失敗，請手動選取"); }
  document.body.removeChild(ta);
}
function currentOutput(){
  const en = buildEN(), zh = buildZH();
  if(outLang==="zh") return zh;
  if(outLang==="both") return en + "\n\n" + zh;
  return en;
}
function snapshotSel(){
  const o = {}, a = {}, b = {};
  CATEGORIES.forEach(c=>{
    if(APPEAR.has(c.id)){ a[c.id]=[...selA[c.id]]; b[c.id]=[...selB[c.id]]; }
    else o[c.id]=[...sel[c.id]];
  });
  return { sel:o, selA:a, selB:b, mode:charMode, subject:document.getElementById("subjectInput").value };
}
function applySnapshot(snap){
  CATEGORIES.forEach(c=>{
    if(APPEAR.has(c.id)){
      selA[c.id] = new Set((snap.selA && snap.selA[c.id]) || (snap.sel && snap.sel[c.id]) || []);
      selB[c.id] = new Set((snap.selB && snap.selB[c.id]) || []);
    } else sel[c.id] = new Set((snap.sel && snap.sel[c.id]) || []);
  });
  charMode = snap.mode || "solo"; activeChar = "A";
  document.getElementById("subjectInput").value = snap.subject || "";
  renderCategories(); refresh();
}

  if(!favorites.length){ wrap.innerHTML = '<div class="empty">還沒有收藏。在組合器選好元素後，按「⭐ 存入收藏」。</div>'; return; }
  favorites.forEach((f,i)=>{
    const d = document.createElement("div");
    d.className = "list-item";
    d.innerHTML = '<div class="li-head"><span class="li-name">⭐ '+escapeHtml(f.name)+'</span>'
      + '<span class="li-time">'+f.time+'</span></div>'
      + '<div class="li-text">'+escapeHtml(f.preview)+'</div>';
    const btns = document.createElement("div");
    btns.className = "li-btns";
    const b1 = document.createElement("button"); b1.className="btn small"; b1.textContent="載入";

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}
function nowStr(){
  const d = new Date();
  const p = n=>String(n).padStart(2,"0");
  return d.getFullYear()+"/"+p(d.getMonth()+1)+"/"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes());
}

function renderVocab(){
  const wrap = document.getElementById("vocabMgr");
  wrap.innerHTML = "";
  CATEGORIES.forEach(cat=>{
    const box = document.createElement("div");
    box.className = "card";
    box.style.background = "var(--panel2)";
    const h = document.createElement("h3");
    h.innerHTML = '<span class="zh">'+cat.zh+'</span>';
    box.appendChild(h);
    const list = document.createElement("div");
    list.className = "chips";
    (customTerms[cat.id]||[]).forEach((it,idx)=>{
      const c = document.createElement("div");
      c.className = "chip custom";
      c.innerHTML = it.zh + '<span class="en">' + escapeHtml(it.en) + '</span> ✕';
      c.title = "點擊刪除";
      c.onclick = ()=>{
        customTerms[cat.id].splice(idx,1);

        save(LS.custom, customTerms);
        renderVocab(); renderCategories(); refresh();
      };
      list.appendChild(c);
    });
    if(!(customTerms[cat.id]||[]).length){
      const e = document.createElement("span");
      e.style.cssText = "color:var(--muted);font-size:12px;";
      e.textContent = "（尚無自訂詞條）";
      list.appendChild(e);
    }
    box.appendChild(list);
    const add = document.createElement("div");
    add.className = "vocab-add";
    const iz = document.createElement("input"); iz.type="text"; iz.placeholder="中文，例：星空下";
    const ie = document.createElement("input"); ie.type="text"; ie.placeholder="English, e.g. under a starry sky";
    const ab = document.createElement("button"); ab.className="btn small"; ab.textContent="＋ 新增";
    ab.onclick = ()=>{
      const zh = iz.value.trim(), en = ie.value.trim();
      if(!zh || !en){ toast("中英文都要填喔"); return; }
      customTerms[cat.id] = customTerms[cat.id] || [];
      customTerms[cat.id].push({zh,en});
      save(LS.custom, customTerms);
      iz.value=""; ie.value="";
      renderVocab(); renderCategories();
      toast("已新增到「"+cat.zh.replace(/^\S+\s/,"")+"」");
    };
    add.append(iz,ie,ab);
    box.appendChild(add);
    wrap.appendChild(box);
  });
}

/* ============ 分頁與事件 ============ */
function switchPage(id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on", t.dataset.page===id));
  document.querySelectorAll(".page").forEach(p=>p.classList.toggle("on", p.id==="page-"+id));
  if(id==="favorites") renderFavs();
  if(id==="history") renderHistory();
  if(id==="vocab") renderVocab();
}
document.querySelectorAll(".tab").forEach(t=>t.onclick = ()=>switchPage(t.dataset.page));
document.querySelectorAll(".out-toggle button").forEach(b=>b.onclick = ()=>setOutLang(b.dataset.lang));
document.getElementById("subjectInput").addEventListener("input", refresh);

document.getElementById("copyBtn").onclick = ()=>{
  const txt = currentOutput();
  if(!txt.trim()){ toast("先選一些元素吧"); return; }
  copyText(txt);
  history.unshift({text:txt, time:nowStr()});
  history = history.slice(0,30);
  save(LS.hist, history);
};
document.getElementById("saveFavBtn").onclick = ()=>{
  const en = buildEN();
  if(!en){ toast("先選一些元素吧"); return; }
  const name = prompt("幫這個組合取個名字：", "我的組合 " + (favorites.length+1));
  if(name===null) return;
  favorites.unshift({ name:name||("組合"+(favorites.length+1)), snap:snapshotSel(), preview:en, time:nowStr() });
  save(LS.fav, favorites);
  toast("已存入收藏 ⭐");
};
document.getElementById("clearAll").onclick = ()=>{
  CATEGORIES.forEach(c=>{ if(APPEAR.has(c.id)){ selA[c.id].clear(); selB[c.id].clear(); } else sel[c.id].clear(); });
  document.getElementById("subjectInput").value = "";
  renderCategories(); refresh();
};
document.getElementById("clearHistory").onclick = ()=>{
  if(!history.length) return;
  if(confirm("確定清空所有歷史紀錄？")){ history=[]; save(LS.hist,history); renderHistory(); }
};
document.getElementById("randomBtn").onclick = ()=>{
  const pickRand = arr => arr[Math.floor(Math.random()*arr.length)].en;
  const isSolo = Math.random()<0.5;
  charMode = isSolo ? "solo" : "duo"; activeChar = "A";
  CATEGORIES.forEach(c=>{
    if(APPEAR.has(c.id)){ selA[c.id].clear(); selB[c.id].clear(); return; }
    sel[c.id].clear();
    if(c.id==="subject" && isSolo) return;
    if(c.id==="action" && !isSolo) return;
    if((c.id==="duoAction"||c.id==="duoMood") && isSolo) return;
    if(c.id==="camera" && Math.random()<0.5) return;
    sel[c.id].add(pickRand(allItems(c)));
  });
  const fillAppear = (m)=>{
    CATEGORIES.forEach(c=>{
      if(!APPEAR.has(c.id)) return;
      if(c.id==="hairTech" && Math.random()<0.6) return;
      if(c.id!=="gender" && c.id!=="hairTech" && Math.random()<0.4) return;
      if(c.id==="hairStyleM" && m["hairStyle"].size) return;
      if((c.id==="topWear"||c.id==="bottomWear") && m["outfit"].size) return;
      m[c.id].add(pickRand(allItems(c)));
    });
    if(m["hairTech"].size && m["hairColor"].size<2){
      const colors = allItems(CATEGORIES.find(c=>c.id==="hairColor"));
      let guard = 0;
      while(m["hairColor"].size<2 && guard++<20) m["hairColor"].add(pickRand(colors));
    }
  };
  fillAppear(selA);
  if(!isSolo) fillAppear(selB);
  renderCategories(); refresh();
  toast("🎲 隨機組合完成，不喜歡再按一次");
};

/* ============ 手機底部抽屜 ============ */
function setSheet(open){
  document.getElementById("previewWrap").classList.toggle("open", open);
  document.getElementById("sheetBackdrop").classList.toggle("show", open);
  document.getElementById("sheetChev").textContent = open ? "▼ 收合" : "▲ 展開";
}
document.getElementById("sheetBar").addEventListener("click",(e)=>{
  if(e.target.closest("#sheetCopy")) return;
  setSheet(!document.getElementById("previewWrap").classList.contains("open"));
});
document.getElementById("sheetBackdrop").addEventListener("click",()=>setSheet(false));
document.getElementById("sheetCopy").addEventListener("click",(e)=>{
  e.stopPropagation();
  document.getElementById("copyBtn").click();
});

/* ============ 啟動 ============ */
renderCategories();
renderTemplates();
refresh();
</script>
